spring:
  application:
    name: cafeqr-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cafeqr}
    username: ${SPRING_DATASOURCE_USERNAME:cafeqr}
    password: ${SPRING_DATASOURCE_PASSWORD:cafeqr}
    hikari:
      maximum-pool-size: 10
      pool-name: cafeqr-pool
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${APP_JWT_SECRET:Y2FmZXFyLXN1cGVyLXNlY3JldC1rZXktY2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tMTIzNDU2}
    access-token-ttl-minutes: 60
    refresh-token-ttl-days: 30
    issuer: cafeqr
  storage:
    type: local
    local-dir: ${APP_STORAGE_DIR:uploads}
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
