<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0E0F12" />
    <title>CafeQR — قائمة وطلب عبر QR لمقاهي عُمان | QR menu & ordering</title>
    <meta name="description" content="منصّة عربية أولاً للطلب عبر رمز QR: قائمة رقمية، شاشة مطبخ مباشرة، ودفع اختياري — لمقاهي عُمان. A bilingual QR menu & ordering platform for cafés." />
    <meta name="keywords" content="QR menu, cafe ordering, Oman, قائمة QR, طلب المقهى, شاشة المطبخ, kitchen display, مقهى" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CafeQR — QR menu & ordering for Omani cafés" />
    <meta property="og:description" content="Scan, order from the table, track live. Arabic-first, built for cafés." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Markazi+Text:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // set theme + direction before first paint to avoid a flash
      try {
        document.documentElement.dataset.theme = localStorage.getItem('cafeqr_theme') || 'dark';
        var l = localStorage.getItem('cafeqr_lang') || 'ar';
        document.documentElement.lang = l;
        document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
