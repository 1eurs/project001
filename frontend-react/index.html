    <!-- Only the core UI fonts load up front. Menu-theme display fonts, the dashboard's
         Bricolage, and the /designs gallery fonts are injected on demand by the routes
         that use them (src/lib/fonts.ts), so a customer scanning a QR pays for none of it. -->
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // set theme + direction before first paint to avoid a flash
      try {
        document.documentElement.dataset.theme = localStorage.getItem('cafeqr_theme') || 'dark';
        var l = localStorage.getItem('cafeqr_lang') || 'ar';
        document.documentElement.lang = l;
        document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
      } catch (e) {}
    </script>
    <script>
      // QR scans land straight on /r/... — start fetching the menu JSON now, in
      // parallel with the JS bundle, instead of waiting for React to boot first.
      // MenuPage picks the in-flight response up via consumePrimedMenu().
      try {
        var pm = location.pathname.match(/^\/r\/([^/]+)(?:\/b\/(\d+)(?:\/t\/([^/]+))?)?/);
        if (pm) {
          var purl = pm[3] ? '/api/public/qr/' + pm[3] + '/menu'
                   : pm[2] ? '/api/public/restaurants/' + pm[1] + '/branches/' + pm[2] + '/menu'
                   : '/api/public/restaurants/' + pm[1] + '/menu';
          window.__menuPrime = { url: purl, res: fetch(purl, { headers: { Accept: 'application/json' } }) };
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>

  </body>
