<?xml version="1.0" encoding="UTF-8"?>
<!-- Source for public/og.png (1200×630), neo-brutalist BOLD style to match the landing.
     Regenerate (fonts: Bricolage Grotesque ExtraBold + IBM Plex Sans Arabic Bold via a
     temp fontconfig dir — see git history of this file for the download commands):
       FONTCONFIG_FILE=/tmp/ogfonts/fonts.conf rsvg-convert -w 1200 -h 630 scripts/og-image.svg -o public/og.png -->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#047857" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- paper + grid -->
  <rect width="1200" height="630" fill="#f5efe3"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- poster border -->
  <rect x="16" y="16" width="1168" height="598" fill="none" stroke="#07130d" stroke-width="6"/>

  <!-- brand -->
  <text x="64" y="112" font-family="Bricolage Grotesque" font-weight="800" font-size="48" fill="#07130d">SERVA<tspan fill="#047857">.</tspan></text>

  <!-- sticker: no app -->
  <g transform="rotate(5 1010 110)">
    <rect x="888" y="86" width="250" height="52" fill="#07130d"/>
    <rect x="882" y="80" width="250" height="52" fill="#f5b83d" stroke="#07130d" stroke-width="4"/>
    <text x="1007" y="115" text-anchor="middle" font-family="IBM Plex Sans Arabic" font-weight="700" font-size="22" fill="#07130d">بدون تطبيق ★ NO APP</text>
  </g>

  <!-- decorative QR tile (not scannable) -->
  <g transform="translate(96 252) rotate(-4)">
    <rect x="10" y="10" width="210" height="210" fill="#07130d"/>
    <rect x="0" y="0" width="210" height="210" fill="#ffffff" stroke="#07130d" stroke-width="5"/>
    <g fill="#07130d">
      <rect x="22" y="22" width="50" height="50"/><rect x="30" y="30" width="34" height="34" fill="#ffffff"/><rect x="38" y="38" width="18" height="18"/>
      <rect x="138" y="22" width="50" height="50"/><rect x="146" y="30" width="34" height="34" fill="#ffffff"/><rect x="154" y="38" width="18" height="18"/>
      <rect x="22" y="138" width="50" height="50"/><rect x="30" y="146" width="34" height="34" fill="#ffffff"/><rect x="38" y="154" width="18" height="18"/>
      <rect x="86" y="22" width="12" height="12"/><rect x="110" y="34" width="12" height="12"/><rect x="86" y="58" width="12" height="12"/>
      <rect x="22" y="86" width="12" height="12"/><rect x="46" y="98" width="12" height="12"/><rect x="70" y="86" width="12" height="12"/>
      <rect x="98" y="86" width="12" height="12"/><rect x="122" y="98" width="12" height="12"/><rect x="98" y="110" width="12" height="12"/>
      <rect x="146" y="86" width="12" height="12"/><rect x="170" y="98" width="12" height="12"/><rect x="158" y="110" width="12" height="12"/>
      <rect x="86" y="138" width="12" height="12"/><rect x="110" y="150" width="12" height="12"/><rect x="98" y="162" width="12" height="12"/>
      <rect x="134" y="138" width="12" height="12"/><rect x="158" y="150" width="12" height="12"/><rect x="170" y="170" width="12" height="12"/>
      <rect x="110" y="186" width="12" height="12"/><rect x="86" y="174" width="12" height="12"/>
    </g>
  </g>

  <!-- headline -->
  <text x="1120" y="295" text-anchor="start" direction="rtl" xml:lang="ar" font-family="IBM Plex Sans Arabic" font-weight="700" font-size="84" fill="#07130d">اطلب من</text>

  <rect x="708" y="320" width="418" height="120" fill="#07130d"/>
  <rect x="700" y="312" width="418" height="120" fill="#34e2a4" stroke="#07130d" stroke-width="5"/>
  <text x="909" y="402" text-anchor="middle" direction="rtl" xml:lang="ar" font-family="IBM Plex Sans Arabic" font-weight="700" font-size="80" fill="#07130d">أي مكان</text>

  <text x="1120" y="492" text-anchor="end" font-family="Bricolage Grotesque" font-weight="800" font-size="27" letter-spacing="1.5" fill="#07130d">ORDER FROM ANYWHERE — TABLE · COUNTER · CAR</text>

  <!-- bottom bar -->
  <rect x="16" y="538" width="1168" height="76" fill="#07130d"/>
  <text x="64" y="587" font-family="Bricolage Grotesque" font-weight="800" font-size="30" fill="#34e2a4">serva.om</text>
  <text x="1120" y="586" text-anchor="start" direction="rtl" xml:lang="ar" font-family="IBM Plex Sans Arabic" font-weight="700" font-size="25" fill="#f5efe3">امسح · اطلب · استلم</text>
</svg>
