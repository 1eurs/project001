<?xml version="1.0" encoding="UTF-8"?>
<!-- Source for public/og.png (1200×630). Regenerate:
       rsvg-convert -w 1200 -h 630 scripts/og-image.svg -o public/og.png -->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#15181C" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#FAFAF7"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#15181C" stroke-width="6"/>

  <!-- SERVA badge (matches landing nav) -->
  <rect x="56" y="52" width="188" height="56" fill="#10b981" stroke="#15181C" stroke-width="4"/>
  <text x="150" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="34" fill="#15181C">SERVA</text>

  <!-- Built in Oman sticker -->
  <g transform="rotate(3 1040 78)">
    <rect x="900" y="54" width="268" height="48" fill="#15181C"/>
    <rect x="894" y="48" width="268" height="48" fill="#F5B83D" stroke="#15181C" stroke-width="4"/>
    <text x="1028" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="18" fill="#15181C">★ BUILT IN OMAN</text>
  </g>

  <!-- Headline -->
  <text x="64" y="200" font-family="system-ui, sans-serif" font-weight="800" font-size="62" fill="#15181C">Serve faster.</text>
  <text x="64" y="278" font-family="system-ui, sans-serif" font-weight="800" font-size="62" fill="#15181C">Run smarter.</text>
  <rect x="60" y="296" width="430" height="78" fill="#15181C"/>
  <rect x="52" y="288" width="430" height="78" fill="#10b981" stroke="#15181C" stroke-width="5"/>
  <text x="267" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="58" fill="#15181C">Grow bigger.</text>

  <!-- Arabic hook -->
  <text x="1136" y="200" text-anchor="end" font-family="system-ui, sans-serif" font-weight="700" font-size="42" fill="#15181C">خدمة أسرع.</text>
  <text x="1136" y="258" text-anchor="end" font-family="system-ui, sans-serif" font-weight="700" font-size="42" fill="#15181C">إدارة أذكى.</text>
  <text x="1136" y="316" text-anchor="end" font-family="system-ui, sans-serif" font-weight="700" font-size="42" fill="#15181C">نموّ أكبر.</text>

  <!-- Feature strip -->
  <rect x="64" y="420" width="1072" height="56" fill="#15181C"/>
  <text x="600" y="458" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="22" letter-spacing="2" fill="#10b981">POS  ·  ONLINE &amp; QR ORDERING  ·  LOYALTY  ·  ANALYTICS  ·  ONE PLATFORM</text>

  <!-- Subline -->
  <text x="64" y="520" font-family="system-ui, sans-serif" font-weight="600" font-size="24" fill="#15181C" opacity="0.85">Your whole operation in one cloud platform — from 15 OMR/mo</text>
  <text x="1136" y="520" text-anchor="end" font-family="system-ui, sans-serif" font-weight="600" font-size="22" fill="#15181C" opacity="0.85">منصّة واحدة لكل عملك — من ١٥ ر.ع/شهر</text>

  <!-- Bottom bar -->
  <rect x="20" y="548" width="1160" height="62" fill="#15181C"/>
  <text x="56" y="590" font-family="system-ui, sans-serif" font-weight="800" font-size="32" fill="#10b981">serva.om</text>
  <text x="1144" y="590" text-anchor="end" font-family="system-ui, sans-serif" font-weight="700" font-size="22" fill="#FAFAF7">Cafés &amp; restaurants in Oman</text>
</svg>