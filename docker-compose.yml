services:
  db:
    image: postgres:16-alpine
    container_name: cafeqr-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cafeqr
      POSTGRES_USER: cafeqr
      POSTGRES_PASSWORD: cafeqr
    ports:
      - "5432:5432"
    volumes:
      - cafeqr-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafeqr -d cafeqr"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cafeqr-net

  backend:
    build: .
    container_name: cafeqr-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cafeqr
      SPRING_DATASOURCE_USERNAME: cafeqr
      SPRING_DATASOURCE_PASSWORD: cafeqr
      APP_PUBLIC_BASE_URL: "https://serva.om"
      APP_CORS_ORIGINS: "https://serva.om,https://www.serva.om,https://m7m2od.com,https://www.m7m2od.com,http://localhost:3000,http://localhost:5173"
    ports:
      - "8080:8080"
    volumes:
      - cafeqr-uploads:/app/uploads
    networks:
      - cafeqr-net

networks:
  cafeqr-net:
    name: cafeqr-net

volumes:
  cafeqr-db-data:
  cafeqr-uploads:
